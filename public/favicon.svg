<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0fdfa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="url(#bgGrad)" />
  
  <!-- Map pin shape -->
  <path d="M256 80 C176 80 112 144 112 224 C112 304 256 432 256 432 C256 432 400 304 400 224 C400 144 336 80 256 80 Z" fill="url(#pinGrad)" opacity="0.95" />
  
  <!-- Wheelchair accessibility symbol inside pin -->
  <g transform="translate(256, 210) scale(1.1)" fill="none" stroke="#0d9488" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wheelchair circle -->
    <circle cx="0" cy="30" r="42" fill="none" />
    <!-- Seat and backrest -->
    <path d="M-20,-40 L-20,30 L30,30" fill="none" />
    <!-- Armrest and wheel connection -->
    <path d="M-20,0 L30,0 L50,40" fill="none" />
    <!-- Head -->
    <circle cx="-20" cy="-55" r="14" fill="#0d9488" stroke="none" />
    <!-- Small wheel detail -->
    <circle cx="0" cy="30" r="8" fill="#0d9488" stroke="none" />
  </g>
</svg>